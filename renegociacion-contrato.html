<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Icons ──
const CheckIcon = () => <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-5" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const UploadIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
const EditIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
const TrashIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>;
const BankIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>;
const PlusIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const CloseIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const CheckCircle = ({ color = "#16a34a", size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke={color} strokeWidth="2"/><path d="M8 12l3 3 5-5" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const FileCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/></svg>;
const PersonIcon = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
const DocIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>;
const LocationIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563eb" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>;

const ImagePlaceholder = () => <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>;
const PowerIcon = ({ on }) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={on ? "#16a34a" : "#ef4444"} strokeWidth="2.5" strokeLinecap="round"><path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>;

// ── POLYGON TABLE COMPONENT ──
const COUNTRY_RANGES_POLY = {
  CO:{min:1000,max:30000,sym:"COP",name:"Colombia"},
  CL:{min:500,max:10000,sym:"CLP",name:"Chile"},
  BR:{min:1,max:100,sym:"BRL",name:"Brasil"},
  AR:{min:30,max:5000,sym:"ARS",name:"Argentina"},
  MX:{min:7,max:300,sym:"MXN",name:"Mexico"},
  PE:{min:1,max:50,sym:"PEN",name:"Peru"},
  UY:{min:20,max:200,sym:"UYU",name:"Uruguay"},
  CR:{min:600,max:3000,sym:"CRC",name:"Costa Rica"},
  EC:{min:1,max:20,sym:"USD",name:"Ecuador"},
};
const MAX_KM_POLY = 12;
const MAX_POLYS = 10;
function mkPoly(id){return{id,name:"Poligono "+id,distance:"",price:""}}

function PolygonTable({country}){
  const [rows,setRows]=React.useState([mkPoly(1),mkPoly(2),mkPoly(3)]);
  const [errs,setErrs]=React.useState({});
  const range=COUNTRY_RANGES_POLY[country]||COUNTRY_RANGES_POLY.CO;
  function chg(id,f,v){
    if(f==="price"&&v.includes(","))return;
    setRows(p=>p.map(r=>r.id===id?{...r,[f]:v}:r));
    let e=null;
    if(f==="distance"){const n=parseFloat(v);if(v!==""&&(isNaN(n)||n<0))e="Valor invalido";else if(!isNaN(n)&&n>MAX_KM_POLY)e="Maximo "+MAX_KM_POLY+" km";}
    else{if(/,/.test(v))e="Use punto (.) como decimal";else{const n=parseFloat(v);if(v!==""&&!isNaN(n)&&(n<range.min||n>range.max))e=range.name+": entre "+range.min.toLocaleString()+" y "+range.max.toLocaleString();}}
    setErrs(p=>{const k=id+"-"+f;if(e)return{...p,[k]:e};const nx={...p};delete nx[k];return nx;});
  }
  function del(id){setRows(p=>p.filter(r=>r.id!==id));setErrs(p=>{const nx={...p};delete nx[id+"-distance"];delete nx[id+"-price"];return nx;});}
  const hasErr=Object.keys(errs).length>0;
  const filled=rows.every(r=>r.distance!==""&&r.price!=="");
  const allOk=!hasErr&&filled&&rows.length>0;
  const iStyle={width:"100%",padding:"5px 8px",borderRadius:6,fontSize:12,outline:"none"};
  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}},
      React.createElement("span",{style:{fontSize:12,color:"#6b7280"}},
        "Pais: ",React.createElement("strong",{style:{color:"#111"}},range.name)
      ),
      React.createElement("span",{style:{fontSize:11,background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:20,padding:"3px 10px",fontWeight:600}},
        "Rango: "+range.sym+" "+range.min.toLocaleString()+" - "+range.max.toLocaleString()
      )
    ),
    React.createElement("div",{style:{background:"#f8f9fb",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#6b7280",marginBottom:12,lineHeight:1.5}},
      "Max. ",React.createElement("strong",null,MAX_KM_POLY+" km")," por poligono",
      " · Use ",React.createElement("strong",null,"."),` como decimal (ej: 1.5) · Precios dentro del rango del pais`
    ),
    React.createElement("div",{style:{border:"1px solid #e5e7eb",borderRadius:10,overflow:"hidden",marginBottom:10}},
      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse"}},
        React.createElement("thead",null,React.createElement("tr",{style:{background:"#f9fafb"}},
          ["#","Poligono","Distancia (km)","Precio ("+range.sym+")",""].map((h,i)=>
            React.createElement("th",{key:i,style:{padding:"8px 12px",fontSize:10,fontWeight:700,color:"#6b7280",textAlign:"left",borderBottom:"1px solid #e5e7eb",textTransform:"uppercase",width:i===0?32:i===4?38:i===2?160:i===3?190:"auto"}},h)
          )
        )),
        React.createElement("tbody",null,rows.map(row=>{
          const dE=errs[row.id+"-distance"],pE=errs[row.id+"-price"];
          return React.createElement("tr",{key:row.id,style:{borderBottom:"1px solid #f3f4f6"}},
            React.createElement("td",{style:{padding:"7px 12px",fontSize:11,color:"#9ca3af",fontWeight:600}},row.id),
            React.createElement("td",{style:{padding:"7px 12px",fontSize:12,color:"#374151",fontWeight:500}},row.name),
            React.createElement("td",{style:{padding:"7px 12px"}},
              React.createElement("input",{type:"number",step:"0.1",min:"0",max:MAX_KM_POLY,value:row.distance,placeholder:"0.0",onChange:e=>chg(row.id,"distance",e.target.value),style:{...iStyle,border:"1px solid "+(dE?"#ef4444":row.distance?"#86efac":"#e5e7eb"),background:dE?"#fef2f2":row.distance?"#f0fdf4":"white"}}),
              dE&&React.createElement("div",{style:{fontSize:10,color:"#ef4444",marginTop:2}},"! "+dE)
            ),
            React.createElement("td",{style:{padding:"7px 12px"}},
              React.createElement("input",{type:"text",inputMode:"decimal",value:row.price,placeholder:"0.00",onChange:e=>chg(row.id,"price",e.target.value),style:{...iStyle,border:"1px solid "+(pE?"#ef4444":row.price?"#86efac":"#e5e7eb"),background:pE?"#fef2f2":row.price?"#f0fdf4":"white"}}),
              pE&&React.createElement("div",{style:{fontSize:10,color:"#ef4444",marginTop:2}},"! "+pE)
            ),
            React.createElement("td",{style:{padding:"7px 12px",textAlign:"center"}},
              React.createElement("button",{onClick:()=>del(row.id),style:{width:24,height:24,border:"1px solid #fecdca",background:"#fff5f5",borderRadius:5,color:"#ef4444",fontSize:14,cursor:"pointer",lineHeight:1}},"×")
            )
          );
        }))
      )
    ),
    React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
      React.createElement("button",{onClick:()=>{if(rows.length>=MAX_POLYS)return;const id=rows.length?Math.max(...rows.map(r=>r.id))+1:1;setRows(p=>[...p,mkPoly(id)]);},disabled:rows.length>=MAX_POLYS,style:{padding:"7px 14px",border:"1px dashed #d1d5db",borderRadius:20,background:"white",fontSize:12,color:rows.length>=MAX_POLYS?"#d1d5db":"#6b7280",cursor:rows.length>=MAX_POLYS?"not-allowed":"pointer",fontWeight:500}},
        "+ Agregar poligono ("+rows.length+"/"+MAX_POLYS+")"
      ),
      React.createElement("span",{style:{fontSize:11,fontWeight:600,padding:"5px 12px",borderRadius:20,background:allOk?"#dcfce7":hasErr?"#fef9c3":"#f3f4f6",color:allOk?"#16a34a":hasErr?"#b45309":"#6b7280",border:"1px solid "+(allOk?"#bbf7d0":hasErr?"#fde68a":"#e5e7eb")}},
        allOk?"Valido":hasErr?"Corrige los errores":"Completa los campos"
      )
    )
  );
}

// ── Stepper ──
const STEPS = ["Formulario de marca", "Documentos", "Formulario de Razón Social", "Formulario de Cuenta Bancaria", "Edición de Condiciones Contractuales", "Confirmación de Datos"];

function Stepper({ current, completed }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "20px 8px 14px", position: "relative", overflowX: "auto" }}>
      {STEPS.map((label, i) => {
        const done = completed.includes(i);
        const active = i === current;
        const isLast = i === STEPS.length - 1;
        return (
          <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: "1 0 0", minWidth: 80, position: "relative" }}>
            {!isLast && <div style={{ position: "absolute", top: 15, left: "calc(50% + 16px)", right: "calc(-50% + 16px)", height: 3, background: done ? "#2563eb" : "#e5e7eb", zIndex: 0, borderRadius: 2 }} />}
            <div style={{ width: 30, height: 30, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: done || active ? "#2563eb" : "#f3f4f6", color: done || active ? "white" : "#9ca3af", fontWeight: 700, fontSize: 12, zIndex: 1, border: done || active ? "3px solid #2563eb" : "2px solid #e5e7eb", transition: "all .3s" }}>
              {i + 1}
            </div>
            <span style={{ fontSize: 9, marginTop: 4, color: active ? "#2563eb" : done ? "#2563eb" : "#9ca3af", fontWeight: active ? 700 : 500, textAlign: "center", lineHeight: 1.2, maxWidth: 100 }}>{label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── Field ──
function Field({ label, value, onChange, dropdown, half, disabled, placeholder, type = "text", green }) {
  const borderColor = green ? "#bbf7d0" : "#e5e7eb";
  return (
    <div style={{ flex: half ? "0 0 48%" : "1 1 100%", minWidth: half ? 140 : 0 }}>
      <label style={{ fontSize: 10, fontWeight: 700, color: green ? "#16a34a" : "#6b7280", textTransform: "uppercase", letterSpacing: ".5px" }}>{label}</label>
      {dropdown ? (
        <div style={{ position: "relative" }}>
          <select value={value} onChange={e => onChange?.(e.target.value)} disabled={disabled} style={{ width: "100%", padding: "10px 12px", border: `1px solid ${borderColor}`, borderRadius: 8, fontSize: 14, fontWeight: 500, appearance: "none", background: disabled ? "#f9fafb" : "white", color: "#111", cursor: disabled ? "default" : "pointer" }}>
            {dropdown.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
          <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#9ca3af", fontSize: 12 }}>▼</span>
        </div>
      ) : (
        <input type={type} value={value} onChange={e => onChange?.(e.target.value)} disabled={disabled} placeholder={placeholder} style={{ width: "100%", padding: "10px 12px", border: `1px solid ${borderColor}`, borderRadius: 8, fontSize: 14, fontWeight: 500, background: disabled ? "#f9fafb" : "white", color: "#111", boxSizing: "border-box" }} />
      )}
    </div>
  );
}

// ── Bank Form ──
function BankForm({ account, onSave, onCancel }) {
  const [f, setF] = useState(account || { titular: "GLOBAL MARKET CONNECTION SAS", tipoId: "NIT", numId: "9009744512", banco: "", tipoCuenta: "Cuenta de Ahorros", numCuenta: "0550116800032033", domicilio: "CL 29 5 100 AV FERROCARRIL LC 2", prefijo: "+57", telefono: "", email: "Marketplusr.2016@gmail.com", certUploaded: false });
  const u = (k, v) => setF(p => ({ ...p, [k]: v }));
  return (
    <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 24, background: "white", position: "relative" }}>
      <button onClick={onCancel} style={{ position: "absolute", top: 14, right: 14, background: "none", border: "none", cursor: "pointer" }}><CloseIcon /></button>
      <h3 style={{ fontSize: 17, fontWeight: 700, margin: "0 0 18px" }}>{account ? "Editar Cuenta Bancaria" : "Agregar Cuenta Bancaria"}</h3>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 55%", display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", gap: 12 }}><Field label="Nombre del titular de la cuenta" value={f.titular} onChange={v => u("titular", v)} /><Field label="Tipo de identificación" value={f.tipoId} onChange={v => u("tipoId", v)} dropdown={["NIT", "CUIT", "CC", "CE", "Pasaporte"]} half /></div>
          <div style={{ display: "flex", gap: 12 }}><Field label="Identidad del titular de la cuenta" value={f.numId} onChange={v => u("numId", v)} half /><Field label="Seleccione un banco" value={f.banco} onChange={v => u("banco", v)} dropdown={["", "Davivienda", "Bancolombia", "BBVA", "Banco de Bogotá", "Nequi", "Mercado Pago"]} half /></div>
          <div style={{ display: "flex", gap: 12 }}><Field label="Tipo de cuenta" value={f.tipoCuenta} onChange={v => u("tipoCuenta", v)} dropdown={["Cuenta de Ahorros", "Cuenta Corriente"]} half /><Field label="Número de cuenta" value={f.numCuenta} onChange={v => u("numCuenta", v)} half /></div>
          <Field label="Domicilio fiscal" value={f.domicilio} onChange={v => u("domicilio", v)} />
          <div style={{ display: "flex", gap: 12 }}><Field label="Prefijo de país" value={f.prefijo} onChange={v => u("prefijo", v)} dropdown={["+57", "+54", "+52"]} half /><Field label="Teléfono de contacto" value={f.telefono} onChange={v => u("telefono", v)} placeholder="Teléfono de contacto" half /></div>
          <Field label="Correo electrónico de facturación" value={f.email} onChange={v => u("email", v)} />
        </div>
        <div style={{ flex: "1 1 35%", minWidth: 220 }}>
          <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>Certificado Bancario <span style={{ color: "#ef4444" }}>*</span></div>
            <p style={{ fontSize: 11, color: "#6b7280", margin: "6px 0 12px", lineHeight: 1.4 }}>Sube el certificado bancario vigente (máx. 30 días).</p>
            {f.certUploaded ? (
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8 }}>
                <FileCheck /><div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 600 }}>Certificado_Banco.pdf</div><div style={{ fontSize: 11, color: "#16a34a" }}>Cargado</div></div>
              </div>
            ) : (
              <button onClick={() => u("certUploaded", true)} style={{ width: "100%", padding: 20, border: "2px dashed #d1d5db", borderRadius: 8, background: "#fafafa", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, color: "#6b7280", fontSize: 12 }}><UploadIcon /> Subir certificado</button>
            )}
            <div style={{ marginTop: 16, border: "1px solid #e5e7eb", borderRadius: 8, padding: 12, background: "#fafafa", minHeight: 120, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div style={{ textAlign: "center", color: "#9ca3af", fontSize: 12 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#111", marginBottom: 4 }}>CERTIFICACION</div>
                <div>Vista previa del certificado</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 20 }}>
        <button onClick={onCancel} style={{ padding: "10px 20px", background: "none", border: "none", fontSize: 14, cursor: "pointer", color: "#374151" }}>Cancelar</button>
        <button onClick={() => onSave({ ...f, certUploaded: true })} style={{ padding: "10px 20px", background: "#2563eb", color: "white", border: "none", borderRadius: 24, fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><CheckCircle color="white" size={18} /> Guardar cuenta</button>
      </div>
    </div>
  );
}

// ── Hours Table ──
const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
const HOURS = [];
for (let h = 0; h < 24; h++) { HOURS.push(`${String(h).padStart(2, "0")}:00`); HOURS.push(`${String(h).padStart(2, "0")}:30`); }

function HoursTable({ hours, onChange }) {
  const total = DAYS.reduce((s, d) => { const o = parseFloat(hours[d]?.open || "0"); const c = parseFloat(hours[d]?.close || "0"); return s + Math.max(c - o, 0); }, 0);
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 13, color: "#6b7280" }}>Min. horas:</span><span style={{ padding: "3px 10px", background: "#f3f4f6", borderRadius: 6, fontSize: 13, fontWeight: 600 }}>40</span></div>
        <div style={{ fontSize: 13 }}>Horas registradas: <strong>{total.toFixed(1)}</strong></div>
      </div>
      <div style={{ borderTop: "1px solid #e5e7eb" }}>
        <div style={{ display: "flex", padding: "10px 0", fontWeight: 700, fontSize: 13 }}><div style={{ width: 100 }}>Día</div><div style={{ width: 110 }}>Abre</div><div style={{ width: 110 }}>Cierra</div></div>
        {DAYS.map(d => (
          <div key={d} style={{ display: "flex", alignItems: "center", padding: "8px 0", borderTop: "1px solid #f3f4f6" }}>
            <div style={{ width: 100, fontSize: 14 }}>{d}</div>
            <div style={{ width: 110 }}><select value={hours[d]?.open || "12:00"} onChange={e => onChange(d, "open", e.target.value)} style={{ padding: "5px 8px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, background: "#f9fafb", cursor: "pointer" }}>{HOURS.map(h => <option key={h}>{h}</option>)}</select></div>
            <div style={{ width: 110 }}><select value={hours[d]?.close || "20:30"} onChange={e => onChange(d, "close", e.target.value)} style={{ padding: "5px 8px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, background: "#f9fafb", cursor: "pointer" }}>{HOURS.map(h => <option key={h}>{h}</option>)}</select></div>
          </div>
        ))}
      </div>
    </div>
  );
}

          })}
          <button onClick={() => { setShowNewStoreForm(true); setActiveTab(null); }} style={{ marginLeft: 6, padding: "8px 14px", border: "1px dashed #d1d5db", borderRadius: 8, background: "none", cursor: "pointer", fontWeight: 600, fontSize: 12, color: "#6b7280", display: "flex", alignItems: "center", gap: 5 }}>
            <PlusIcon /> Nueva tienda
          </button>
        </div>

        {/* Nueva tienda form */}
        {showNewStoreForm && (
          <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 24, background: "white", marginBottom: 20, position: "relative" }}>
            <button onClick={() => setShowNewStoreForm(false)} style={{ position: "absolute", top: 14, right: 14, background: "none", border: "none", cursor: "pointer" }}><CloseIcon /></button>
            <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 18 }}>Agregar nueva tienda</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ display: "flex", gap: 12 }}>
                <Field label="Nombre de la tienda" value={newStoreName} onChange={setNewStoreName} placeholder="Ej. Délice Del Mundo Norte" />
                <Field label="Tipo de comida" value="" onChange={() => {}} dropdown={["Comida rápida", "Comida saludable", "Postres", "Hamburguesas"]} />
              </div>
              <Field label="Dirección" value={newStoreAddr} onChange={setNewStoreAddr} placeholder="Calle, número, ciudad, departamento" />
              <div style={{ display: "flex", gap: 12 }}>
                <Field label="Prefijo + Teléfono" value="" onChange={() => {}} placeholder="+57 300 000 0000" half />
                <Field label="Email" value="" onChange={() => {}} placeholder="tienda@marca.com" half />
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 20 }}>
              <button onClick={() => { setShowNewStoreForm(false); setNewStoreName(""); setNewStoreAddr(""); }} style={{ padding: "10px 20px", background: "none", border: "none", fontSize: 14, cursor: "pointer", color: "#374151" }}>Cancelar</button>
              <button onClick={() => {
                if (!newStoreName.trim()) return;
                const newId = Date.now();
                const defHours = {}; DAYS.forEach(d => { defHours[d] = { open: "12:00", close: "20:30" }; });
                setTiendas(p => [...p, { id: newId, nombre: newStoreName, storeId: String(Math.floor(Math.random()*900000000+100000000)), direccion: newStoreAddr || "Dirección pendiente", activa: true }]);
                setStoreConfig(p => ({ ...p, [newId]: { bankAccounts: [...bankAccounts], showBankForm: false, editingBank: null, hoursConfig: defHours, menuOk: false, completed: { bank: true, horarios: false, menu: false } } }));
                setActiveTab(newId);
                setShowNewStoreForm(false);
                setNewStoreName(""); setNewStoreAddr("");
              }} style={{ padding: "10px 20px", background: "#2563eb", color: "white", border: "none", borderRadius: 24, fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><CheckCircle color="white" size={18} /> Agregar tienda</button>
            </div>
          </div>
        )}

        {/* Store panel */}
        {activeTab && (() => {
          const store = tiendas.find(t => t.id === activeTab);
          const sc = storeConfig[activeTab];
          if (!store || !sc) return null;

          if (!store.activa) return (
            <div style={{ textAlign: "center", padding: "40px 20px" }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>⚠️</div>
              <h3 style={{ fontSize: 18, fontWeight: 700, color: "#ef4444" }}>Tienda Desactivada</h3>
              <p style={{ fontSize: 14, color: "#6b7280", marginTop: 6 }}>{store.nombre} está actualmente desactivada y no será incluida en la renegociación.</p>
              <button onClick={() => toggleTienda(store.id)} style={{ marginTop: 16, padding: "10px 24px", background: "#16a34a", color: "white", border: "none", borderRadius: 24, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                Reactivar tienda
              </button>
            </div>
          );

          const updateSC = (field, value) => setStoreConfig(p => ({ ...p, [activeTab]: { ...p[activeTab], [field]: value } }));
          const updateCompleted = (field, value) => setStoreConfig(p => ({ ...p, [activeTab]: { ...p[activeTab], completed: { ...p[activeTab].completed, [field]: value } } }));

          return (
            <div>
              {/* Store info header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", background: "#eff6ff", borderRadius: 10, marginBottom: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <LocationIcon />
                  <div><div style={{ fontWeight: 700, fontSize: 15 }}>{store.nombre}</div><div style={{ fontSize: 12, color: "#6b7280" }}>Store ID: {store.storeId} · {store.direccion}</div></div>
                </div>
                <button onClick={() => toggleTienda(store.id)} style={{ padding: "6px 14px", border: "1px solid #ef4444", borderRadius: 20, background: "white", color: "#ef4444", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                  Desactivar
                </button>
              </div>

              {/* Cuenta Bancaria */}
              <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 18, background: "white", marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}><BankIcon /><div><div style={{ fontWeight: 700, fontSize: 14 }}>Cuenta Bancaria</div><div style={{ fontSize: 12, color: "#6b7280" }}>Gestiona la cuenta bancaria de esta tienda.</div></div></div>
                  {!sc.showBankForm && <button onClick={() => { updateSC("editingBank", null); updateSC("showBankForm", true); }} style={{ padding: "6px 14px", border: "1px solid #e5e7eb", borderRadius: 20, background: "white", cursor: "pointer", fontWeight: 600, fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}><PlusIcon /> Agregar</button>}
                </div>
                {sc.bankAccounts.map((acc, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", padding: "12px 14px", border: "1px solid #e5e7eb", borderRadius: 10, background: "white", marginBottom: 8 }}>
                    <BankIcon /><div style={{ marginLeft: 10, flex: 1 }}><div style={{ fontWeight: 600, fontSize: 13 }}>{acc.banco || "Banco"} - {acc.tipoCuenta}</div><div style={{ fontSize: 11, color: "#6b7280" }}>{acc.titular} · <code style={{ fontSize: 10, background: "#f3f4f6", padding: "1px 5px", borderRadius: 4 }}>{acc.numCuenta}</code></div><div style={{ fontSize: 10, color: "#16a34a", fontWeight: 600, marginTop: 2, display: "flex", alignItems: "center", gap: 3 }}><CheckCircle color="#16a34a" size={14} /> CERTIFICADO VALIDADO</div></div>
                    <button onClick={() => { updateSC("editingBank", i); updateSC("showBankForm", true); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><EditIcon /></button>
                    <button onClick={() => { updateSC("bankAccounts", sc.bankAccounts.filter((_, j) => j !== i)); if (sc.bankAccounts.length <= 1) updateCompleted("bank", false); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><TrashIcon /></button>
                  </div>
                ))}
                {sc.showBankForm && <BankForm account={sc.editingBank !== null ? sc.bankAccounts[sc.editingBank] : null} onSave={acc => { let a; if (sc.editingBank !== null) { a = sc.bankAccounts.map((x, i) => i === sc.editingBank ? acc : x); } else { a = [...sc.bankAccounts, acc]; } updateSC("bankAccounts", a); updateSC("showBankForm", false); updateSC("editingBank", null); updateCompleted("bank", true); }} onCancel={() => { updateSC("showBankForm", false); updateSC("editingBank", null); }} />}
              </div>

              {/* Horarios, Menú cards */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <div style={{ border: sc.completed.horarios ? "2px solid #bbf7d0" : "1px solid #e5e7eb", borderRadius: 12, padding: 18, background: sc.completed.horarios ? "#f0fdf4" : "white" }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 6 }}>Horarios de atención</h3>
                  <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>Configura los días y horas de apertura.</p>
                  {!sc.completed.horarios ? (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}><span style={{ color: "#f59e0b", fontWeight: 600, fontSize: 12 }}>Pendiente</span><button onClick={() => updateCompleted("horarios", true)} style={{ padding: "7px 18px", background: "#2563eb", color: "white", border: "none", borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Iniciar</button></div>
                  ) : <div style={{ display: "flex", alignItems: "center", gap: 6 }}><CheckCircle size={18} /><span style={{ color: "#16a34a", fontWeight: 600, fontSize: 12 }}>Completado</span></div>}
                </div>
                <div style={{ border: sc.completed.menu ? "2px solid #bbf7d0" : "1px solid #e5e7eb", borderRadius: 12, padding: 18, background: sc.completed.menu ? "#f0fdf4" : "white" }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 6 }}>Menú y catálogo</h3>
                  <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>Actualiza productos, precios y descripciones.</p>
                  {!sc.completed.menu ? (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}><span style={{ color: "#f59e0b", fontWeight: 600, fontSize: 12 }}>Pendiente</span><button onClick={() => updateCompleted("menu", true)} style={{ padding: "7px 18px", background: "#2563eb", color: "white", border: "none", borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Iniciar</button></div>
                  ) : <div style={{ display: "flex", alignItems: "center", gap: 6 }}><CheckCircle size={18} /><span style={{ color: "#16a34a", fontWeight: 600, fontSize: 12 }}>Completado</span></div>}
                </div>
              </div>
              {condiciones.tipoDelivery === "Marketplace" && (
                <div style={{ marginTop: 16, border: "1px solid #e5e7eb", borderRadius: 12, padding: 20, background: "white" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <span>📍</span>
                    <h3 style={{ fontSize: 15, fontWeight: 700, margin: 0 }}>Detalle de Poligonos</h3>
                    <span style={{ fontSize: 11, background: "#fff0eb", color: "#c4320a", border: "1px solid #f9c9b8", borderRadius: 20, padding: "2px 8px", fontWeight: 600 }}>Marketplace</span>
                  </div>
                  <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 14 }}>Configura los poligonos de cobertura para esta tienda.</p>
                  <PolygonTable country="CO" />
                </div>
              )}
            </div>
          );
        })()}
      </div>
    );
  };

  // ═══════ LAYOUT ═══════
  return (
    <div style={{ fontFamily: "'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif", background: "#f8f9fb", minHeight: "100vh", color: "#111" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 28px", borderBottom: "1px solid #e5e7eb", background: "white" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}><h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>Proceso Comercial</h1><span style={{ background: "#dcfce7", color: "#16a34a", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 12 }}>Completado</span><span style={{ fontSize: 11, color: "#9ca3af" }}>v1.17.3</span></div>
          <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 2 }}>Procesos Comerciales › Buscador › <strong style={{ color: "#374151" }}>Renegociación de contrato</strong></div>
        </div>
        <button style={{ padding: "8px 18px", border: "1px solid #ef4444", borderRadius: 20, background: "white", color: "#ef4444", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Cancelar</button>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 20px 40px" }}>
        <div style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 12, padding: "12px 18px", margin: "16px 0", display: "flex", alignItems: "center", gap: 10 }}>
          <PersonIcon /><div><div style={{ fontSize: 13, fontWeight: 600 }}>Razón social</div><div style={{ fontSize: 12, color: "#6b7280" }}>{razonSocial.nombre} | {razonSocial.nit} | {razonSocial.razon} | {razonSocial.email}</div></div>
        </div>

        {!wizardDone && (
          <>
            <div style={{ background: "white", borderRadius: "16px 16px 0 0", border: "1px solid #e5e7eb", borderBottom: "none" }}><Stepper current={step} completed={completed} /></div>
            <div style={{ background: "white", borderRadius: "0 0 16px 16px", border: "1px solid #e5e7eb", borderTop: "none", padding: "24px 28px" }}>{renderStep()}</div>
            {step !== 3 && (
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
                <button onClick={goBack} disabled={step === 0} style={{ padding: "10px 24px", border: "1px solid #e5e7eb", borderRadius: 24, background: "white", fontSize: 14, fontWeight: 600, cursor: step === 0 ? "default" : "pointer", color: step === 0 ? "#d1d5db" : "#2563eb" }}>Volver</button>
                <button onClick={goNext} style={{ padding: "10px 24px", background: "#2563eb", color: "white", border: "none", borderRadius: 24, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>{step === 5 ? "Cerrar" : "Siguiente"}</button>
              </div>
            )}
          </>
        )}

        {wizardDone && (
          <div style={{ background: "white", borderRadius: 16, border: "1px solid #e5e7eb", padding: "24px 28px" }}>{renderPanel()}</div>
        )}
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(RenegociacionContrato));
</script>
</body>
</html>
