function Step5({ accounts, setAccounts }) {
  const [showForm, setShowForm] = useState(false);
  const [editingIdx, setEditingIdx] = useState(null);
  const [formData, setFormData] = useState({});

  function startNew() {
    setFormData({});
    setEditingIdx(null);
    setShowForm(true);
  }
  function startEdit(idx) {
    setFormData({...accounts[idx]});
    setEditingIdx(idx);
    setShowForm(true);
  }
  function saveAccount() {
    if (editingIdx !== null) {
      const updated = [...accounts];
      updated[editingIdx] = formData;
      setAccounts(updated);
    } else {
      setAccounts([...accounts, formData]);
    }
    setShowForm(false);
    setEditingIdx(null);
    setFormData({});
  }
  function deleteAccount(idx) {
    setAccounts(accounts.filter((_,i)=>i!==idx));
  }

  return (
    <div>
      <div className="step-heading">Cuentas Bancarias</div>
      <div className="step-subheading">Revisa las cuentas del aliado. Puedes agregar nuevas, editar o eliminar. Las cuentas guardadas aquí estarán disponibles para asociar a la tienda al finalizar.</div>

      <div style={{background:'#e8f5e9', border:'1px solid #81c784', borderRadius:8, padding:'10px 16px', marginBottom:20, fontSize:12, color:'#2e7d32', display:'flex', alignItems:'center', gap:8}}>
        <span>🤖</span> Hemos pre-cargado la cuenta identificada en el certificado bancario del aliado
      </div>

      {/* Account cards */}
      {accounts.map((acc, idx) => (
        editingIdx === idx && showForm
          ? <BankAccountForm key={idx} account={formData} onChange={setFormData} onCancel={()=>{setShowForm(false);setEditingIdx(null);}} onSave={saveAccount} isNew={false}/>
          : (
            <div key={idx} style={{border:'1.5px solid #81c784', borderRadius:12, padding:16, marginBottom:12, background:'#f9fff9', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div style={{display:'flex', gap:14, alignItems:'flex-start'}}>
                <div style={{width:40, height:40, borderRadius:10, background:'#e8f5e9', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0}}>🏦</div>
                <div>
                  <div style={{fontSize:13, fontWeight:700, color:'#1a1a2e', marginBottom:2}}>{acc.nombreTitular || 'Sin nombre'}</div>
                  <div style={{fontSize:12, color:'#555'}}>{acc.banco || '—'} · {acc.tipoCuenta || '—'}</div>
                  <div style={{fontSize:12, color:'#888'}}>Cta: {acc.numeroCuenta || '—'} · ID: {acc.nit || '—'}</div>
                  <div style={{fontSize:11, color:'#66bb6a', marginTop:4, display:'flex', alignItems:'center', gap:4}}>
                    <span style={{background:'#e8f5e9', padding:'1px 7px', borderRadius:10, fontWeight:600}}>✓ Certificado validado</span>
                    {idx===0 && <span style={{background:'#e8f0fe', color:'#4361ee', padding:'1px 7px', borderRadius:10, fontWeight:600}}>✔ Heredado</span>}
                  </div>
                </div>
              </div>
              <div style={{display:'flex', gap:6}}>
                <button className="doc-btn" title="Editar" onClick={()=>startEdit(idx)}>✏️</button>
                <button className="doc-btn" title="Eliminar" onClick={()=>deleteAccount(idx)} style={{color:'#e63946'}}>🗑</button>
              </div>
            </div>
          )
      ))}

      {/* New account form */}
      {showForm && editingIdx === null && (
        <BankAccountForm account={formData} onChange={setFormData} onCancel={()=>setShowForm(false)} onSave={saveAccount} isNew={true}/>
      )}

      {/* Add button */}
      {!showForm && (
        <button onClick={startNew} style={{width:'100%', border:'1.5px dashed #4361ee', borderRadius:10, padding:'12px', background:'#f5f7ff', color:'#4361ee', fontSize:13, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8}}>

  );

  const days = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const [schedule, setSchedule] = useState(days.map(d=>({day:d, open:true, from:'08:00', to:'22:00'})));
  function toggle(i) { setSchedule(s=>s.map((r,j)=>j===i?{...r,open:!r.open}:r)); }
  function setTime(i,field,val) { setSchedule(s=>s.map((r,j)=>j===i?{...r,[field]:val}:r)); }
  return (
    <div className="inner-modal">
      <div className="inner-modal-box">
        <div className="inner-modal-header">
          <div className="inner-modal-title">🕐 Horarios de atención</div>
          <button className="inner-modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="inner-modal-body">
          <div style={{fontSize:12, color:'#888', marginBottom:14}}>Define los horarios de atención de la tienda para cada día de la semana.</div>
          {schedule.map((row,i)=>(
            <div key={i} className="horario-row">
              <div className="horario-day">{row.day}</div>
              <label className="toggle-row" style={{minWidth:80}}>
                <span className="toggle">
                  <input type="checkbox" checked={row.open} onChange={()=>toggle(i)}/>
                  <span className="toggle-slider"/>
                </span>
                <span style={{fontSize:12, color: row.open?'#2e7d32':'#aaa'}}>{row.open?'Abierto':'Cerrado'}</span>
              </label>
              {row.open && <>
                <input className="horario-time" type="time" value={row.from} onChange={e=>setTime(i,'from',e.target.value)}/>
                <span style={{fontSize:12,color:'#aaa'}}>a</span>
                <input className="horario-time" type="time" value={row.to} onChange={e=>setTime(i,'to',e.target.value)}/>
              </>}
            </div>
          ))}
        </div>
        <div className="inner-modal-footer">
          <button className="btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn-save" onClick={()=>{ onSave(); onClose(); }}>Guardar horarios</button>
        </div>
      </div>
    </div>
  );
}

// ─── Wizard Modal ──────────────────────────────────────────────────────────
function InboundWizard({ process, onClose }) {
  const [currentStep, setCurrentStep] = useState(process.progress || 1);
  const [data, setData] = useState({...inheritedData});
  const [accounts, setAccounts] = useState([{
    nombreTitular: inheritedData.nombreTitular,
    tipoIdBanco: inheritedData.tipoIdBanco,
    nit: inheritedData.nit,
    banco: inheritedData.banco,
    tipoCuenta: inheritedData.tipoCuenta,
    numeroCuenta: inheritedData.numeroCuenta,
    domicilioFiscal: inheritedData.domicilioFiscal,
    emailFacturacion: inheritedData.emailFacturacion,
  }]);
  const [finished, setFinished] = useState(false);

  if (finished) {
    return <PostWizardPanel process={process} accounts={accounts} onClose={onClose}/>;
  }

  function renderStep() {
    switch(currentStep) {
      case 1: return <Step1 data={data} setData={setData}/>;
      case 2: return <Step2 data={data} setData={setData}/>;
      case 3: return <Step3/>;
      case 4: return <Step4 data={data} setData={setData}/>;
      case 5: return <Step5 accounts={accounts} setAccounts={setAccounts}/>;
      case 6: return <Step6/>;
      case 7: return <Step7 data={data}/>;
      default: return null;
    }
  }

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-panel">
        {/* Header */}
        <div className="wizard-topbar">
          <div>
            <div className="wizard-title">
              Proceso Inbound
              <span className="inbound-badge-title">🔓 Inbound</span>
            </div>
            <div className="breadcrumb">
              Procesos Comerciales › Buscador › <span>Nueva negociación — Inbound</span>
            </div>
          </div>
          <button className="close-btn" onClick={onClose}>✕ Cerrar</button>
        </div>

        {/* Banner */}
        <div className="inbound-banner">
          <div className="inbound-banner-icon">⚡</div>
          <div>
            <div className="inbound-banner-title">Proceso Inbound — Información pre-cargada</div>
            <div className="inbound-banner-text">
              Este proceso retoma la información ingresada previamente por el aliado <strong>mr.kevin27070@gmail.com</strong>. Los campos en verde fueron heredados automáticamente y son editables. Avanza por cada paso para revisar y ajustar lo que sea necesario antes de completar el proceso.
            </div>
          </div>
        </div>

        {/* Stepper */}
        <div className="stepper">
          <div className="stepper-row">
            {steps.map((s,i)=>{
              const n = i+1;
              const isDone = n < currentStep;
              const isActive = n === currentStep;
              return (
                <div key={i} className="step-item">
                  <div className="step-circle-wrap">
                    {i>0 && <div className={`step-line ${n<=currentStep?'done':'pending'}`}/>}
                    <div
                      className={`step-circle ${isDone?'done':isActive?'active':'pending'}`}
                      onClick={()=>{ if(n<=currentStep || n===currentStep+1) setCurrentStep(n); }}
                    >
                      {isDone ? '✓' : n}
                    </div>
                    {i<steps.length-1 && <div className={`step-line ${isDone?'done':'pending'}`}/>}
                  </div>
                  <div className={`step-label ${isActive?'active':''}`}>{s}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Step content */}
        <div className="wizard-content">
          {renderStep()}
        </div>

        {/* Footer */}
        <div className="wizard-footer">
          <button className="btn-back" onClick={()=>currentStep>1 && setCurrentStep(currentStep-1)} disabled={currentStep===1}>
            Volver
          </button>
          {currentStep < 7
            ? <button className="btn-next" onClick={()=>setCurrentStep(currentStep+1)}>Siguiente →</button>
            : <button className="btn-finish" onClick={()=>setFinished(true)}>✓ Finalizar proceso</button>
          }
        </div>
      </div>
    </div>
  );
}
