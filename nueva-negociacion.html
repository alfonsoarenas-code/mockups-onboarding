<html lang="es">
<head>

<style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Icon Components ──
const CheckIcon = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-5" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

const UploadIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
);
const EditIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
);
const TrashIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
);
const BankIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
);
const DocIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
);
const PlusIcon = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
);
const CloseIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
);
const CheckCircleIcon = ({ color = "#16a34a" }) => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke={color} strokeWidth="2"/><path d="M8 12l3 3 5-5" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
);
const FileCheckIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/></svg>
);


// ── POLYGON TABLE COMPONENT ──
const COUNTRY_RANGES_POLY = {
  CO:{min:1000,max:30000,sym:"COP",name:"Colombia"},
  CL:{min:500,max:10000,sym:"CLP",name:"Chile"},
  BR:{min:1,max:100,sym:"BRL",name:"Brasil"},
  AR:{min:30,max:5000,sym:"ARS",name:"Argentina"},
  MX:{min:7,max:300,sym:"MXN",name:"Mexico"},
  PE:{min:1,max:50,sym:"PEN",name:"Peru"},
  UY:{min:20,max:200,sym:"UYU",name:"Uruguay"},
  CR:{min:600,max:3000,sym:"CRC",name:"Costa Rica"},
  EC:{min:1,max:20,sym:"USD",name:"Ecuador"},
};
const MAX_KM_POLY = 12;
const MAX_POLYS = 10;
function mkPoly(id){return{id,name:"Poligono "+id,distance:"",price:""}}

function PolygonTable({country}){
  const [rows,setRows]=React.useState([mkPoly(1),mkPoly(2),mkPoly(3)]);
  const [errs,setErrs]=React.useState({});
  const range=COUNTRY_RANGES_POLY[country]||COUNTRY_RANGES_POLY.CO;
  function chg(id,f,v){
    if(f==="price"&&v.includes(","))return;
    setRows(p=>p.map(r=>r.id===id?{...r,[f]:v}:r));
    let e=null;
    if(f==="distance"){const n=parseFloat(v);if(v!==""&&(isNaN(n)||n<0))e="Valor invalido";else if(!isNaN(n)&&n>MAX_KM_POLY)e="Maximo "+MAX_KM_POLY+" km";}
    else{if(/,/.test(v))e="Use punto (.) como decimal";else{const n=parseFloat(v);if(v!==""&&!isNaN(n)&&(n<range.min||n>range.max))e=range.name+": entre "+range.min.toLocaleString()+" y "+range.max.toLocaleString();}}
    setErrs(p=>{const k=id+"-"+f;if(e)return{...p,[k]:e};const nx={...p};delete nx[k];return nx;});
  }
  function del(id){setRows(p=>p.filter(r=>r.id!==id));setErrs(p=>{const nx={...p};delete nx[id+"-distance"];delete nx[id+"-price"];return nx;});}
  const hasErr=Object.keys(errs).length>0;
  const filled=rows.every(r=>r.distance!==""&&r.price!=="");
  const allOk=!hasErr&&filled&&rows.length>0;
  const iStyle={width:"100%",padding:"5px 8px",borderRadius:6,fontSize:12,outline:"none"};
  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}},
      React.createElement("span",{style:{fontSize:12,color:"#6b7280"}},
        "Pais: ",React.createElement("strong",{style:{color:"#111"}},range.name)
      ),
      React.createElement("span",{style:{fontSize:11,background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:20,padding:"3px 10px",fontWeight:600}},
        "Rango: "+range.sym+" "+range.min.toLocaleString()+" - "+range.max.toLocaleString()
      )
    ),
    React.createElement("div",{style:{background:"#f8f9fb",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#6b7280",marginBottom:12,lineHeight:1.5}},
      "Max. ",React.createElement("strong",null,MAX_KM_POLY+" km")," por poligono",
      " · Use ",React.createElement("strong",null,"."),` como decimal (ej: 1.5) · Precios dentro del rango del pais`
    ),
    React.createElement("div",{style:{border:"1px solid #e5e7eb",borderRadius:10,overflow:"hidden",marginBottom:10}},
      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse"}},
        React.createElement("thead",null,React.createElement("tr",{style:{background:"#f9fafb"}},
          ["#","Poligono","Distancia (km)","Precio ("+range.sym+")",""].map((h,i)=>
            React.createElement("th",{key:i,style:{padding:"8px 12px",fontSize:10,fontWeight:700,color:"#6b7280",textAlign:"left",borderBottom:"1px solid #e5e7eb",textTransform:"uppercase",width:i===0?32:i===4?38:i===2?160:i===3?190:"auto"}},h)
          )
        )),
        React.createElement("tbody",null,rows.map(row=>{
          const dE=errs[row.id+"-distance"],pE=errs[row.id+"-price"];
          return React.createElement("tr",{key:row.id,style:{borderBottom:"1px solid #f3f4f6"}},
            React.createElement("td",{style:{padding:"7px 12px",fontSize:11,color:"#9ca3af",fontWeight:600}},row.id),
            React.createElement("td",{style:{padding:"7px 12px",fontSize:12,color:"#374151",fontWeight:500}},row.name),
            React.createElement("td",{style:{padding:"7px 12px"}},
              React.createElement("input",{type:"number",step:"0.1",min:"0",max:MAX_KM_POLY,value:row.distance,placeholder:"0.0",onChange:e=>chg(row.id,"distance",e.target.value),style:{...iStyle,border:"1px solid "+(dE?"#ef4444":row.distance?"#86efac":"#e5e7eb"),background:dE?"#fef2f2":row.distance?"#f0fdf4":"white"}}),
              dE&&React.createElement("div",{style:{fontSize:10,color:"#ef4444",marginTop:2}},"! "+dE)
            ),
            React.createElement("td",{style:{padding:"7px 12px"}},
              React.createElement("input",{type:"text",inputMode:"decimal",value:row.price,placeholder:"0.00",onChange:e=>chg(row.id,"price",e.target.value),style:{...iStyle,border:"1px solid "+(pE?"#ef4444":row.price?"#86efac":"#e5e7eb"),background:pE?"#fef2f2":row.price?"#f0fdf4":"white"}}),
              pE&&React.createElement("div",{style:{fontSize:10,color:"#ef4444",marginTop:2}},"! "+pE)
            ),
            React.createElement("td",{style:{padding:"7px 12px",textAlign:"center"}},
              React.createElement("button",{onClick:()=>del(row.id),style:{width:24,height:24,border:"1px solid #fecdca",background:"#fff5f5",borderRadius:5,color:"#ef4444",fontSize:14,cursor:"pointer",lineHeight:1}},"×")
            )
          );
        }))
      )
    ),
    React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
      React.createElement("button",{onClick:()=>{if(rows.length>=MAX_POLYS)return;const id=rows.length?Math.max(...rows.map(r=>r.id))+1:1;setRows(p=>[...p,mkPoly(id)]);},disabled:rows.length>=MAX_POLYS,style:{padding:"7px 14px",border:"1px dashed #d1d5db",borderRadius:20,background:"white",fontSize:12,color:rows.length>=MAX_POLYS?"#d1d5db":"#6b7280",cursor:rows.length>=MAX_POLYS?"not-allowed":"pointer",fontWeight:500}},
        "+ Agregar poligono ("+rows.length+"/"+MAX_POLYS+")"
      ),
      React.createElement("span",{style:{fontSize:11,fontWeight:600,padding:"5px 12px",borderRadius:20,background:allOk?"#dcfce7":hasErr?"#fef9c3":"#f3f4f6",color:allOk?"#16a34a":hasErr?"#b45309":"#6b7280",border:"1px solid "+(allOk?"#bbf7d0":hasErr?"#fde68a":"#e5e7eb")}},
        allOk?"Valido":hasErr?"Corrige los errores":"Completa los campos"
      )
    )
  );
}

// ── Stepper ──
const STEPS = [
  "Nombre comercial",
  "Formulario Tienda",
  "Documentos",
  "Razón Social",
  "Cuentas Bancarias",
  "Condiciones",
  "Firma Contrato",
];

function Stepper({ current, completed }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "24px 16px 16px", position: "relative" }}>
      {STEPS.map((label, i) => {
        const done = completed.includes(i);
        const active = i === current;
        const isLast = i === STEPS.length - 1;
        return (
          <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, position: "relative" }}>
            {!isLast && (
              <div style={{
                position: "absolute", top: 18, left: "calc(50% + 20px)", right: "calc(-50% + 20px)", height: 3,
                background: done ? "#16a34a" : "#e5e7eb", zIndex: 0, borderRadius: 2
              }} />
            )}
            <div style={{
              width: 36, height: 36, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
              background: done ? "#16a34a" : active ? "#2563eb" : "#f3f4f6",
              color: done || active ? "white" : "#9ca3af",
              fontWeight: 700, fontSize: 14, zIndex: 1, border: active ? "3px solid #2563eb" : done ? "3px solid #16a34a" : "2px solid #e5e7eb",
              transition: "all .3s"
            }}>
              {done ? <CheckIcon /> : i + 1}
            </div>
            <span style={{
              fontSize: 11, marginTop: 6, color: active ? "#2563eb" : done ? "#16a34a" : "#9ca3af",
              fontWeight: active ? 700 : 500, textAlign: "center", lineHeight: 1.2
            }}>{label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── Field ──
function Field({ label, value, onChange, type = "text", half, dropdown, disabled, placeholder }) {
  return (
    <div style={{ flex: half ? "0 0 48%" : "1 1 100%", minWidth: half ? 180 : 0 }}>
      <label style={{ fontSize: 10, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: ".5px" }}>{label}</label>
      {dropdown ? (
        <div style={{ position: "relative" }}>
          <select value={value} onChange={e => onChange?.(e.target.value)} disabled={disabled}
            style={{ width: "100%", padding: "10px 12px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 14, fontWeight: 500, appearance: "none", background: "white", color: "#111", cursor: "pointer" }}>
            {dropdown.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
          <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#9ca3af", fontSize: 12 }}>▼</span>
        </div>
      ) : (
        <input type={type} value={value} onChange={e => onChange?.(e.target.value)} disabled={disabled} placeholder={placeholder}
          style={{ width: "100%", padding: "10px 12px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 14, fontWeight: 500, background: disabled ? "#f9fafb" : "white", color: "#111", boxSizing: "border-box" }} />
      )}
    </div>
  );
}

// ── Toggle ──
function Toggle({ label, checked, onChange }) {
  return (
    <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: "#374151" }}>
      <div onClick={() => onChange(!checked)} style={{
        width: 40, height: 22, borderRadius: 11, background: checked ? "#2563eb" : "#d1d5db", position: "relative", transition: "background .2s", cursor: "pointer"
      }}>
        <div style={{ width: 18, height: 18, borderRadius: "50%", background: "white", position: "absolute", top: 2, left: checked ? 20 : 2, transition: "left .2s", boxShadow: "0 1px 3px rgba(0,0,0,.2)" }} />
      </div>
      {label}
    </label>
  );
}

// ── Bank Account Card ──
function BankCard({ account, onEdit, onDelete }) {
  return (
    <div style={{ display: "flex", alignItems: "center", padding: "16px 20px", border: "1px solid #e5e7eb", borderRadius: 12, background: "white", marginBottom: 12 }}>
      <BankIcon />
      <div style={{ marginLeft: 12, flex: 1 }}>
        <div style={{ fontWeight: 600, fontSize: 14 }}>{account.banco} - {account.tipoCuenta}</div>
        <div style={{ fontSize: 12, color: "#6b7280" }}>{account.titular} · <code style={{ fontSize: 11, background: "#f3f4f6", padding: "2px 6px", borderRadius: 4 }}>{account.cbu}</code></div>
        <div style={{ fontSize: 11, color: "#16a34a", fontWeight: 600, marginTop: 2, display: "flex", alignItems: "center", gap: 4 }}>
          <CheckCircleIcon color="#16a34a" /> CERTIFICADO VALIDADO
        </div>
      </div>
      <button onClick={onEdit} style={{ background: "none", border: "none", cursor: "pointer", padding: 6 }}><EditIcon /></button>
      <button onClick={onDelete} style={{ background: "none", border: "none", cursor: "pointer", padding: 6 }}><TrashIcon /></button>
    </div>
  );
}

// ── Bank Form Modal ──

    titular: "Cecilia Gisele Rojas", tipoDoc: "CUIT", numDoc: "27188898438",
    banco: "Mercado Pago", tipoCuenta: "Caja de Ahorros", cbu: "0000031000097607412​71",
    alias: "don.matheo.mp", certUploaded: false
  });
  const u = (k, v) => setForm(p => ({ ...p, [k]: v }));
  return (
    <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 24, background: "white", position: "relative" }}>
      <button onClick={onCancel} style={{ position: "absolute", top: 16, right: 16, background: "none", border: "none", cursor: "pointer" }}><CloseIcon /></button>
      <h3 style={{ fontSize: 18, fontWeight: 700, margin: "0 0 20px", color: "#111" }}>{account ? "Editar Cuenta Bancaria" : "Agregar Cuenta Bancaria"}</h3>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 55%", display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ display: "flex", gap: 12 }}>
            <Field label="Titular de la cuenta *" value={form.titular} onChange={v => u("titular", v)} />
            <Field label="Tipo de doc." value={form.tipoDoc} onChange={v => u("tipoDoc", v)} dropdown={["CUIT", "DNI", "CUIL"]} half />
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <Field label="Número de doc. titular *" value={form.numDoc} onChange={v => u("numDoc", v)} half />
            <Field label="Banco o entidad" value={form.banco} onChange={v => u("banco", v)} dropdown={["Mercado Pago", "Banco Nación", "Banco Galicia", "Brubank", "Ualá"]} half />
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <Field label="Tipo de cuenta" value={form.tipoCuenta} onChange={v => u("tipoCuenta", v)} dropdown={["Caja de Ahorros", "Cuenta Corriente"]} half />
            <Field label="Número de cuenta (CBU/CVU) *" value={form.cbu} onChange={v => u("cbu", v)} half />
          </div>
          <Field label="Alias (opcional)" value={form.alias} onChange={v => u("alias", v)} />
        </div>
        <div style={{ flex: "1 1 35%", minWidth: 220 }}>
          <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#111" }}>Certificado Bancario <span style={{ color: "#ef4444" }}>*</span></div>
            <p style={{ fontSize: 11, color: "#6b7280", margin: "6px 0 12px", lineHeight: 1.4 }}>Es obligatorio subir un documento o imagen válido expedido por tu banco (máx. 30 días de vigencia) para poder asociar esta cuenta a tus tiendas.</p>
            {form.certUploaded ? (
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8 }}>
                <FileCheckIcon />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>Certificado_Banco.pdf</div>
                  <div style={{ fontSize: 11, color: "#16a34a" }}>Cargado exitosamente</div>
                </div>
              </div>
            ) : (
              <button onClick={() => u("certUploaded", true)} style={{
                width: "100%", padding: "20px", border: "2px dashed #d1d5db", borderRadius: 8, background: "#fafafa",
                cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, color: "#6b7280", fontSize: 12
              }}>
                <UploadIcon />
                Subir certificado
              </button>
            )}
          </div>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 20 }}>
        <button onClick={onCancel} style={{ padding: "10px 24px", background: "none", border: "none", fontSize: 14, cursor: "pointer", color: "#374151" }}>Cancelar</button>
        <button onClick={() => onSave({ ...form, certUploaded: true })} style={{
          padding: "10px 24px", background: "#2563eb", color: "white", border: "none", borderRadius: 24, fontSize: 14, fontWeight: 600, cursor: "pointer",
          display: "flex", alignItems: "center", gap: 6
        }}>
          <CheckCircleIcon color="white" /> Guardar cuenta

// ── Store Form (for new stores in panel) ──
function StoreFormPanel({ onSave, onCancel }) {
  const [s, setS] = useState({
    nombre: "", direccion: "", doc: "NIT", numDoc: "", tipoComida: "Argentina",
    prefijo: "+54", telefono: "", email: "", cocinaOculta: false, centroComercial: false
  });
  const u = (k, v) => setS(p => ({ ...p, [k]: v }));
  return (
    <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 24, background: "white" }}>
      <h3 style={{ fontSize: 18, fontWeight: 700, margin: "0 0 16px" }}>Formulario de nueva tienda</h3>
      <p style={{ fontSize: 13, color: "#6b7280", marginBottom: 16 }}>Ingresa los datos de la nueva sucursal.</p>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        <Field label="Nombre de la tienda" value={s.nombre} onChange={v => u("nombre", v)} placeholder="Ej: Sucursal Norte" />
        <Field label="Dirección" value={s.direccion} onChange={v => u("direccion", v)} placeholder="Ej: Calle 123, Ciudad" />
      </div>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 12 }}>
        <Field label="Doc." value={s.doc} onChange={v => u("doc", v)} dropdown={["NIT", "CUIT", "RUT"]} half />
        <Field label="Número de documento" value={s.numDoc} onChange={v => u("numDoc", v)} half />
      </div>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 12 }}>
        <Field label="Tipo de comida" value={s.tipoComida} onChange={v => u("tipoComida", v)} dropdown={["Argentina", "Colombiana", "Mexicana", "Italiana", "Peruana", "Japonesa", "Americana"]} />
      </div>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 12 }}>
        <Field label="Prefijo" value={s.prefijo} onChange={v => u("prefijo", v)} dropdown={["+54", "+57", "+52", "+56", "+51"]} half />
        <Field label="Teléfono" value={s.telefono} onChange={v => u("telefono", v)} half />
      </div>
      <div style={{ marginTop: 12 }}>
        <Field label="Correo electrónico" value={s.email} onChange={v => u("email", v)} placeholder="correo@ejemplo.com" />
      </div>
      <div style={{ display: "flex", gap: 20, marginTop: 16 }}>
        <Toggle label="Es cocina oculta" checked={s.cocinaOculta} onChange={v => u("cocinaOculta", v)} />
        <Toggle label="Se encuentra en centro comercial" checked={s.centroComercial} onChange={v => u("centroComercial", v)} />
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 20 }}>

}

      <div>
        {/* Tabs */}
        <div style={{ display: "flex", alignItems: "center", borderBottom: "2px solid #e5e7eb", marginBottom: 24, gap: 0 }}>
          <button onClick={() => setActiveStoreTab("marca")}
            style={{
              padding: "10px 20px", fontSize: 14, fontWeight: activeStoreTab === "marca" ? 700 : 400, cursor: "pointer",
              background: "none", border: "none", borderBottom: activeStoreTab === "marca" ? "2px solid #2563eb" : "none",
              color: activeStoreTab === "marca" ? "#2563eb" : "#6b7280", display: "flex", alignItems: "center", gap: 6
            }}>
            Marca {marcaCompleted && <CheckCircleIcon color="#16a34a" />}
          </button>
          {stores.map(s => {
            const st = storeStatuses[s.id];
            const done = st && st.bank && st.horario && st.menu;
            return (
              <button key={s.id} onClick={() => setActiveStoreTab(s.id)}
                style={{
                  padding: "10px 20px", fontSize: 14, fontWeight: activeStoreTab === s.id ? 700 : 400, cursor: "pointer",
                  background: "none", border: "none", borderBottom: activeStoreTab === s.id ? "2px solid #2563eb" : "none",
                  color: activeStoreTab === s.id ? "#2563eb" : "#6b7280", display: "flex", alignItems: "center", gap: 6
                }}>
                {s.nombre} {done && <CheckCircleIcon color="#16a34a" />}
              </button>
            );
          })}
          <button onClick={() => setShowNewStoreForm(true)}
            style={{
              padding: "8px 14px", fontSize: 13, cursor: "pointer", background: "none", border: "1px dashed #d1d5db",
              borderRadius: 20, color: "#6b7280", display: "flex", alignItems: "center", gap: 4, marginLeft: 8,
              transition: "all .2s"
            }}
            title="Agregar nueva tienda">
            <PlusIcon /> Nueva tienda
          </button>
        </div>

        {/* New store form */}
        {showNewStoreForm && (
          <div style={{ marginBottom: 24 }}>
            <StoreFormPanel onCancel={() => setShowNewStoreForm(false)} onSave={(data) => {
              const newId = stores.length + 2;
              setStores(p => [...p, { id: newId, nombre: data.nombre || `Sucursal ${newId}`, bankAccount: null }]);
              setStoreStatuses(p => ({ ...p, [newId]: { bank: false, horario: false, menu: false } }));
              setShowNewStoreForm(false);
              setActiveStoreTab(newId);
            }} />
          </div>
        )}

        {/* Marca tab */}
        {activeStoreTab === "marca" && (
          <div>
            <h2 style={h2Style}>Configuración de Marca: {nombreComercial}</h2>
            <p style={descStyle}>Sube el logo y portada para tu marca en la plataforma.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 20 }}>
              <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 20, background: "white" }}>
                <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>Logo de la marca</h3>
                <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>Imagen cuadrada recomendada: 400×400px</p>
                <div style={{ width: "100%", height: 160, background: "#f3f4f6", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", border: "2px dashed #d1d5db" }}>
                  <UploadIcon />
                </div>
              </div>
              <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 20, background: "white" }}>
                <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>Portada de la marca</h3>
                <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>Imagen horizontal recomendada: 1200×400px</p>
                <div style={{ width: "100%", height: 160, background: "#f3f4f6", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", border: "2px dashed #d1d5db" }}>
                  <UploadIcon />
                </div>
              </div>
            </div>
            {!marcaCompleted && (
              <div style={{ textAlign: "right", marginTop: 20 }}>
                <button onClick={() => setMarcaCompleted(true)}
                  style={{ padding: "10px 28px", background: "#2563eb", color: "white", border: "none", borderRadius: 24, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                  Iniciar
                </button>
              </div>
            )}
            {marcaCompleted && (
              <div style={{ marginTop: 16, padding: "12px 16px", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}>
                <CheckCircleIcon /> <span style={{ fontWeight: 600, fontSize: 14, color: "#16a34a" }}>Marca configurada correctamente</span>
              </div>
            )}
          </div>
        )}

        {/* Store tabs */}
        {typeof activeStoreTab === "number" && (() => {
          const store = stores.find(s => s.id === activeStoreTab);
          if (!store) return null;
          const status = storeStatuses[store.id] || { bank: false, horario: false, menu: false };

          return (
            <div>
              <h2 style={h2Style}>Panel de Tienda: {store.nombre}</h2>
              <p style={descStyle}>Completa los pasos específicos para <strong>{store.nombre}</strong>.</p>

              {/* Cuenta Bancaria Asignada */}
              <div style={{ border: "1px solid #e5e7eb", borderRadius: 12, padding: 20, background: "white", marginTop: 16 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <BankIcon />
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>Cuenta Bancaria Asignada</div>
                      <div style={{ fontSize: 12, color: "#6b7280" }}>Selecciona la cuenta donde se depositarán las liquidaciones generadas exclusivamente por las ventas de esta tienda.</div>
                    </div>
                  </div>
                  {bankAccounts.length > 0 && (
                    <select value={store.bankAccount || ""} onChange={e => {
                      const val = e.target.value;
                      setStores(p => p.map(s => s.id === store.id ? { ...s, bankAccount: val } : s));
                      setStoreStatuses(p => ({ ...p, [store.id]: { ...p[store.id], bank: !!val } }));
                    }} style={{ padding: "8px 12px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 13, minWidth: 200 }}>
                      <option value="">Seleccionar cuenta...</option>
                      {bankAccounts.map((a, i) => <option key={i} value={a.banco + a.cbu}>{a.banco} - ...{a.cbu.slice(-4)}</option>)}
                    </select>
                  )}
                </div>
                {bankAccounts.length === 0 && (
                  <p style={{ fontSize: 12, color: "#ef4444", marginTop: 8 }}>No hay cuentas bancarias registradas. Regresa al paso 5 para agregar una.</p>
                )}
              </div>

              {/* Horarios y Menú */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 16 }}>
                <div style={{
                  border: status.horario ? "2px solid #bbf7d0" : "1px solid #e5e7eb", borderRadius: 12, padding: 20,
                  background: status.horario ? "#f0fdf4" : "white"
                }}>
                  <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>Horarios de atención</h3>
                  <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 14 }}>Configura los días y horas de apertura de esta sucursal.</p>
                  {!status.horario ? (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <span style={{ color: "#f59e0b", fontWeight: 600, fontSize: 13 }}>Pendiente</span>
                      <button onClick={() => setStoreStatuses(p => ({ ...p, [store.id]: { ...p[store.id], horario: true } }))}
                        style={{ padding: "8px 20px", background: "#2563eb", color: "white", border: "none", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                        Iniciar
                      </button>
                    </div>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}><CheckCircleIcon /> <span style={{ color: "#16a34a", fontWeight: 600, fontSize: 13 }}>Completado</span></div>
                  )}
                </div>
                <div style={{
                  border: status.menu ? "2px solid #bbf7d0" : "1px solid #e5e7eb", borderRadius: 12, padding: 20,
                  background: status.menu ? "#f0fdf4" : "white"
                }}>
                  <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>Menú y gestión</h3>
                  <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 14 }}>Carga tus productos, configura precios y descripciones del catálogo.</p>
                  {!status.menu ? (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <span style={{ color: "#f59e0b", fontWeight: 600, fontSize: 13 }}>Pendiente</span>
                      <button onClick={() => setStoreStatuses(p => ({ ...p, [store.id]: { ...p[store.id], menu: true } }))}
                        style={{ padding: "8px 20px", background: "#2563eb", color: "white", border: "none", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                        Iniciar
                      </button>
                    </div>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}><CheckCircleIcon /> <span style={{ color: "#16a34a", fontWeight: 600, fontSize: 13 }}>Completado</span></div>
                  )}
                </div>
              </div>
              {condiciones.tipoDelivery === "Marketplace" && (
                <div style={{ marginTop: 16, border: "1px solid #e5e7eb", borderRadius: 12, padding: 20, background: "white" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <span>📍</span>
                    <h3 style={{ fontSize: 15, fontWeight: 700, margin: 0 }}>Detalle de Poligonos</h3>
                    <span style={{ fontSize: 11, background: "#fff0eb", color: "#c4320a", border: "1px solid #f9c9b8", borderRadius: 20, padding: "2px 8px", fontWeight: 600 }}>Marketplace</span>
                  </div>
                  <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 14 }}>Configura los poligonos de cobertura para esta tienda.</p>
                  <PolygonTable country="CO" />
                </div>
              )}
            </div>
          );
        })()}
      </div>
    );
  };

  // ═══════ MAIN LAYOUT ═══════
  const h2Style = { fontSize: 22, fontWeight: 700, color: "#111", margin: "0 0 6px" };
  const descStyle = { fontSize: 14, color: "#6b7280", margin: "0 0 4px", lineHeight: 1.5 };
  const fieldLabelStyle = { fontSize: 10, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: ".5px", display: "block", marginBottom: 4 };

  return (
    <div style={{ fontFamily: "'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif", background: "#f8f9fb", minHeight: "100vh", color: "#111" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 32px", borderBottom: "1px solid #e5e7eb", background: "white" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>Proceso Comercial</h1>
            <span style={{ background: "#dcfce7", color: "#16a34a", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 12 }}>Activo</span>
            <span style={{ fontSize: 11, color: "#9ca3af" }}>v1.17.3</span>
          </div>
          <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 2 }}>
            Procesos Comerciales › Buscador › <strong style={{ color: "#374151" }}>Nueva negociación</strong>
          </div>
        </div>
        <button style={{ padding: "8px 20px", border: "1px solid #ef4444", borderRadius: 20, background: "white", color: "#ef4444", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          Cancelar
        </button>
      </div>

      <div style={{ maxWidth: 1040, margin: "0 auto", padding: "0 24px 40px" }}>
        {!wizardDone && (
          <>
            {/* Stepper */}
            <div style={{ background: "white", borderRadius: "0 0 16px 16px", border: "1px solid #e5e7eb", borderTop: "none", marginBottom: 24 }}>
              <Stepper current={step} completed={completed} />
            </div>

            {/* Step content */}
            <div style={{ background: "white", borderRadius: 16, border: "1px solid #e5e7eb", padding: "28px 32px" }}>
              {renderStep()}
            </div>

            {/* Navigation */}
            {step < 6 && (
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
                <button onClick={goBack} disabled={step === 0}
                  style={{ padding: "10px 28px", border: "1px solid #e5e7eb", borderRadius: 24, background: "white", fontSize: 14, fontWeight: 600, cursor: step === 0 ? "default" : "pointer", color: step === 0 ? "#d1d5db" : "#2563eb" }}>
                  Volver
                </button>
                <button onClick={goNext}
                  style={{ padding: "10px 28px", background: "#2563eb", color: "white", border: "none", borderRadius: 24, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                  Siguiente
                </button>
              </div>
            )}
          </>
        )}

        {wizardDone && (
          <div style={{ marginTop: 24, background: "white", borderRadius: 16, border: "1px solid #e5e7eb", padding: "28px 32px" }}>
            {renderPanel()}
          </div>
        )}
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ProcesoComercial));
</script>
</body>
</html>
