<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rappi SOB — Expansión de Marca (Spinoff)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { background: #F4F6FA; min-height: 100vh; }

        /* Sidebar */
        .sidebar-item { display:flex; align-items:center; gap:12px; padding:10px 20px; font-size:14px; color:#555; cursor:pointer; border-radius:8px; margin:2px 8px; }
        .sidebar-item:hover { background:#F4F6FA; }
        .sidebar-item.active { color:#E53935; font-weight:600; background:#FFF0EF; }
        .sidebar-item.active svg { color:#E53935; }

        /* Panel tabs (Marca / Tienda / +) */
        .ptab { padding:14px 20px; font-size:14px; font-weight:500; color:#9CA3AF; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .2s; }
        .ptab:hover { color:#374151; }
        .ptab.active { color:#1E5AF2; border-bottom-color:#1E5AF2; font-weight:700; }
        .ptab.add-tab { border:1.5px dashed #CBD5E1; border-radius:20px; color:#6B7280; padding:6px 16px; margin-left:4px; font-size:13px; align-self:center; }
        .ptab.add-tab:hover { border-color:#1E5AF2; color:#1E5AF2; background:#EFF6FF; }
        .ptab.add-tab.locked { border-color:#E5E7EB; color:#D1D5DB; cursor:not-allowed; pointer-events:none; }

        /* Status badges */
        .badge-pending { background:#FEF3C7; color:#D97706; font-size:12px; font-weight:600; padding:3px 10px; border-radius:20px; }
        .badge-done { background:#D1FAE5; color:#059669; font-size:12px; font-weight:600; padding:3px 10px; border-radius:20px; }

        /* Cards */
        .config-card { background:white; border:1px solid #E5E7EB; border-radius:12px; padding:20px 24px; }
        .config-card.done { border-left:4px solid #10B981; }
        .config-card.pending { border-left:4px solid #F59E0B; }

        /* Buttons */
        .btn-primary { background:#1E5AF2; color:white; border-radius:24px; padding:9px 24px; font-weight:600; font-size:14px; cursor:pointer; border:none; transition:background .2s; }
        .btn-primary:hover { background:#1749D0; }
        .btn-primary:disabled { background:#CBD5E1; cursor:not-allowed; }
        .btn-secondary { background:white; color:#374151; border:1px solid #E5E7EB; border-radius:24px; padding:9px 24px; font-weight:600; font-size:14px; cursor:pointer; transition:all .2s; }
        .btn-secondary:hover { border-color:#9CA3AF; background:#F9FAFB; }
        .btn-link { color:#1E5AF2; font-size:14px; font-weight:600; cursor:pointer; background:none; border:none; }
        .btn-link:hover { text-decoration:underline; }

        /* Inputs */
        .field-group { margin-bottom:16px; }
        .field-label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#9CA3AF; margin-bottom:6px; }
        .field-input { width:100%; border:1px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; color:#111827; outline:none; transition:border-color .2s; background:white; }
        .field-input:focus { border-color:#1E5AF2; box-shadow:0 0 0 3px rgba(30,90,242,.08); }
        .field-input.readonly { background:#F9FAFB; color:#6B7280; cursor:default; }
        .field-input.locked { background:#F4F6FA; color:#9CA3AF; cursor:not-allowed; }
        select.field-input { appearance:auto; }

        /* Process card (dashboard) */
        .proc-card { background:white; border:1px solid #E5E7EB; border-radius:12px; padding:24px; transition:all .2s; }
        .proc-card:hover { border-color:#93C5FD; box-shadow:0 2px 12px rgba(30,90,242,.08); }
        .proc-card .proc-icon { width:48px; height:48px; border-radius:12px; background:#EFF6FF; display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
        .proc-card h3 { font-size:16px; font-weight:700; color:#111827; margin-bottom:8px; }
        .proc-card p { font-size:13px; color:#6B7280; line-height:1.5; margin-bottom:12px; }
        .proc-meta { font-size:12px; color:#9CA3AF; display:flex; align-items:center; gap:4px; margin-bottom:4px; }

        /* Alerts */
        .alert-info { background:#EFF6FF; border:1px solid #BFDBFE; border-radius:10px; padding:12px 16px; font-size:13px; color:#1E5AF2; }
        .alert-warn { background:#FFFBEB; border:1px solid #FCD34D; border-radius:10px; padding:12px 16px; font-size:13px; color:#B45309; }

        /* Stepper (3 steps) */
        .step-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
        .step-dot.done { background:#10B981; color:white; }
        .step-dot.active { background:#1E5AF2; color:white; }
        .step-dot.idle { background:#E5E7EB; color:#9CA3AF; }
        .step-line { flex:1; height:2px; }
        .step-line.done { background:#10B981; }
        .step-line.idle { background:#E5E7EB; }

        /* Modal */
        .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
        .modal-box { background:white; border-radius:16px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }

        /* Upload zone */
        .upload-zone { border:2px dashed #CBD5E1; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; background:#FAFBFC; transition:all .2s; }
        .upload-zone:hover { border-color:#1E5AF2; background:#EFF6FF; }
        .upload-zone.done { border-color:#10B981; background:#F0FDF4; }

        /* Bank card */
        .bank-card { background:#F9FAFB; border:1px solid #E5E7EB; border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:12px; }
        .bank-card .bank-ico { width:36px; height:36px; border-radius:8px; background:#D1FAE5; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

        /* Rappi header bar */
        .rappi-bar { height:8px; background:linear-gradient(90deg,#E53935,#FF7043); }

        /* Toggle */
        .toggle-wrap { width:40px; height:22px; border-radius:11px; cursor:pointer; transition:background .2s; flex-shrink:0; position:relative; }
        .toggle-wrap.on { background:#10B981; }
        .toggle-wrap.off { background:#D1D5DB; }
        .toggle-thumb { position:absolute; top:3px; left:3px; width:16px; height:16px; background:white; border-radius:50%; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
        .toggle-wrap.on .toggle-thumb { left:21px; }

        /* Breadcrumb */
        .breadcrumb { font-size:13px; color:#9CA3AF; margin-bottom:20px; }
        .breadcrumb span { color:#374151; font-weight:500; }

        /* Scrollbar thin */
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#E5E7EB; border-radius:4px; }
    </style>
</head>
<body>

<!-- Top red bar (Rappi style) -->
<div class="rappi-bar"></div>

<!-- Layout -->
<div style="display:flex; min-height:calc(100vh - 8px);">

    <!-- SIDEBAR -->
    <aside style="width:220px; background:white; border-right:1px solid #E5E7EB; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; flex-shrink:0;">
        <!-- Logo row -->
        <div style="padding:18px 20px; border-bottom:1px solid #F3F4F6; display:flex; align-items:center; gap:10px;">
            <div style="width:36px;height:36px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
            <span style="font-size:13px;font-weight:600;color:#374151;">alfonso.arenas</span>
        </div>
        <nav style="flex:1; padding:12px 0; overflow-y:auto;">
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Usuarios</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Aprobaciones</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Brand Development</div>
            <div class="sidebar-item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Procesos Comerciales</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Indicadores</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg> Herramientas</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Campañas</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Pagos</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Horarios</div>
            <div class="sidebar-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Marketing</div>
        </nav>
        <div class="sidebar-item" style="margin-bottom:12px;color:#EF4444;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión
        </div>
        <div style="padding:8px 20px 12px; font-size:10px; color:#D1D5DB;">v2.39.04</div>
    </aside>

    <!-- MAIN -->
    <main id="app" style="flex:1; overflow-y:auto; min-height:100%;">
    </main>
</div>

<!-- Modal slot -->
<div id="modal-slot"></div>

<script>
// ═══════════════════════════════════════
//  ESTADO GLOBAL
// ═══════════════════════════════════════
const S = {
    view: 'dashboard',       // dashboard | spinoff-search | store-form | bank-accounts | panel
    panelTab: 'brand',       // brand | store-{n} | new-store

    // Aliado encontrado
    aliado: null,            // { nombre, nit, email, brand }

    // Búsqueda de spinoff
    spinoffName: '',

    // Tienda del wizard
    wizardStore: {
        nombre: '', direccion: '', docTipo: 'NIT', docNum: '',
        tipoComida: 'Colombiana', prefijo: '+57', telefono: '', email: '',
        cocina: false, mall: false
    },

    // Cuentas bancarias (del aliado + nuevas)
    bankAccounts: [
        { id: 1, titular: 'La Hamburguesería S.A.S', banco: 'Bancolombia', tipo: 'Ahorros', numero: '456-123456-78', validado: true }
    ],

    // Tiendas en el panel
    stores: [],      // { nombre, direccion, bank: null|obj, logo:false, portada:false, horarios:false, menu:false }
    activeStoreIdx: 0,
};

// ═══════════════════════════════════════
//  NAVEGACIÓN
// ═══════════════════════════════════════
function go(view, extra) {
    S.view = view;
    if (extra) Object.assign(S, extra);
    render();
    document.getElementById('app').scrollTop = 0;
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render() {
    const app = document.getElementById('app');
    switch (S.view) {
        case 'dashboard':      app.innerHTML = viewDashboard(); break;
        case 'spinoff-search': app.innerHTML = viewSpinoffSearch(); break;
        case 'store-form':     app.innerHTML = viewStoreForm(); break;
        case 'bank-accounts':  app.innerHTML = viewBankAccounts(); break;
        case 'panel':          app.innerHTML = viewPanel(); break;
    }
    lucide.createIcons();
}

// ═══════════════════════════════════════
//  STEPPER HELPER (3 pasos)
// ═══════════════════════════════════════
function stepper(current) {
    // current: 0=tienda, 1=bancos, 2=panel
    const labels = ['Formulario de tienda', 'Cuentas bancarias', 'Panel de gestión'];
    let html = `<div style="display:flex;align-items:center;margin-bottom:28px;">`;
    labels.forEach((lbl, i) => {
        const state = i < current ? 'done' : i === current ? 'active' : 'idle';
        html += `
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
            <div class="step-dot ${state}">
                ${state === 'done' 
                    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` 
                    : i + 1}
            </div>
            <span style="font-size:11px;font-weight:600;color:${state==='active'?'#1E5AF2':state==='done'?'#10B981':'#9CA3AF'};white-space:nowrap;">${lbl}</span>
        </div>`;
        if (i < labels.length - 1) {
            html += `<div class="step-line ${i < current ? 'done' : 'idle'}" style="margin:0 8px;margin-bottom:22px;"></div>`;
        }
    });
    html += `</div>`;
    return html;
}

// ═══════════════════════════════════════
//  BANNER RAZÓN SOCIAL
// ═══════════════════════════════════════
function razonBanner() {
    if (!S.aliado) return '';
    return `
    <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:24px;margin-bottom:24px;flex-wrap:wrap;">
        <div>
            <div style="font-size:10px;font-weight:700;color:#93C5FD;text-transform:uppercase;letter-spacing:.05em;">Razón social</div>
            <div style="font-size:14px;font-weight:700;color:#1E40AF;">${S.aliado.nombre}</div>
        </div>
        <div style="width:1px;height:32px;background:#BFDBFE;"></div>
        <div>
            <div style="font-size:10px;font-weight:700;color:#93C5FD;text-transform:uppercase;letter-spacing:.05em;">NIT</div>
            <div style="font-size:14px;font-weight:600;color:#1E3A8A;">${S.aliado.nit}</div>
        </div>
        <div style="width:1px;height:32px;background:#BFDBFE;"></div>
        <div>
            <div style="font-size:10px;font-weight:700;color:#93C5FD;text-transform:uppercase;letter-spacing:.05em;">Email</div>
            <div style="font-size:14px;font-weight:600;color:#1E3A8A;">${S.aliado.email}</div>
        </div>
        <div style="width:1px;height:32px;background:#BFDBFE;"></div>
        <div>
            <div style="font-size:10px;font-weight:700;color:#93C5FD;text-transform:uppercase;letter-spacing:.05em;">Brand</div>
            <div style="font-size:14px;font-weight:700;color:#1E5AF2;">${S.aliado.brand}</div>
        </div>
    </div>`;
}

// ═══════════════════════════════════════
//  VIEW: DASHBOARD
// ═══════════════════════════════════════
function viewDashboard() {
    const aliado = S.aliado;
    return `
    <div style="padding:32px 40px; max-width:960px;">
        <h1 style="font-size:26px;font-weight:800;color:#111827;margin-bottom:4px;">Procesos Comerciales <span style="font-size:13px;font-weight:400;color:#9CA3AF;">v1.17.3</span></h1>
        <div class="breadcrumb">Procesos Comerciales › <span>Buscador</span></div>

        <!-- Buscar -->
        <div style="background:white;border:1px solid #E5E7EB;border-radius:12px;padding:24px;margin-bottom:24px;">
            <h2 style="font-size:16px;font-weight:700;color:#111827;margin-bottom:6px;">Buscar razón social</h2>
            <p style="font-size:13px;color:#6B7280;margin-bottom:20px;">Ingrese el tipo y número de documento de la razón social para ver los procesos comerciales disponibles.</p>
            <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
                <div style="flex:1;min-width:160px;">
                    <label class="field-label">Tipo de Documento</label>
                    <select class="field-input" id="doc-tipo"><option>NIT</option><option>RUT</option><option>CC</option></select>
                </div>
                <div style="flex:2;min-width:200px;">
                    <label class="field-label">NIT</label>
                    <input class="field-input" type="text" id="doc-num" placeholder="Ej: 1020825274" value="${aliado ? aliado.nit : ''}">
                </div>
                <button class="btn-primary" onclick="buscarAliado()" style="height:44px;padding:0 28px;">Buscar</button>
            </div>

            ${aliado ? `
            <div style="margin-top:16px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:12px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                <div style="font-size:13px;color:#374151;font-weight:500;">Razón social: <strong>${aliado.nombre}</strong> | NIT ${aliado.nit} | ${aliado.nombre} | ${aliado.email}</div>
            </div>` : ''}
        </div>

        ${aliado ? `
        <!-- Selección de Brand -->
        <div style="background:white;border:1px solid #E5E7EB;border-radius:12px;padding:24px;margin-bottom:24px;">
            <h2 style="font-size:16px;font-weight:700;color:#111827;margin-bottom:4px;">Selección de Brand</h2>
            <p style="font-size:13px;color:#6B7280;margin-bottom:16px;">Selecciona el brand específico para el cual deseas iniciar el proceso comercial, o continúa sin seleccionar brand.</p>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <div style="border:1px solid #E5E7EB;border-radius:8px;padding:12px 20px;font-size:14px;color:#6B7280;cursor:pointer;">Sin seleccionar brand</div>
                <div style="border:2px solid #1E5AF2;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:600;color:#1E5AF2;cursor:pointer;display:flex;align-items:center;gap:8px;background:#EFF6FF;">
                    ${aliado.brand}
                    <span style="font-size:12px;background:#DBEAFE;padding:2px 8px;border-radius:12px;font-weight:500;">Tiendas 🏪</span>
                </div>
            </div>
        </div>

        <!-- Grid de procesos -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
            ${procCard('store', 'Nueva negociación', 'Gestiona la creación de una nueva unidad de negocio: razón social, marca, punto de venta y contratos asociados', '30 minutos', '~6', false)}
            ${procCard('credit-card', 'Cambio de cuenta bancaria', 'Actualiza la información de la cuenta bancaria donde el aliado recibirá los pagos de sus ventas', '20 minutos', '~1', true)}
            ${procCard('refresh-cw', 'Expansión de marca', 'Gestiona la expansión de una marca existente a una nueva sucursal', '20 minutos', '~1', false)}
            ${procCard('zap', 'Expansión de marca turbo', 'Gestiona la expansión turbo de una marca existente con selección de tienda y modificación de contrato', '20 minutos', '~0', true)}
            ${procCard('edit-2', 'Cambio de nombre de brand', 'Actualiza el nombre del brand registrado en Rappi', '20 minutos', '~0', true)}
            ${procCard('globe', 'Expansión de negocio', 'Creación de franquicias para marcas ya existentes', '20 minutos', '~6', false)}
            ${spinoffCard()}
            ${procCard('refresh-cw', 'Cambio de razón social', 'Cede el contrato actual de la razón social activa a otra', '30 minutos', '~5', true)}
            ${procCard('file-text', 'Cambio de información fiscal', 'Actualiza la información fiscal del aliado y los datos del representante legal', '30 minutos', '~4', true)}
            ${procCard('sliders', 'Edición de condiciones contractuales', 'Modifica las condiciones del contrato según nueva negociación', '25 minutos', '~1', true)}
        </div>` : ''}
    </div>`;
}

function procCard(icon, title, desc, dur, docs, enabled) {
    return `
    <div class="proc-card" style="${!enabled ? 'opacity:.55;' : ''}">
        <div class="proc-icon"><i data-lucide="${icon}" style="width:22px;height:22px;color:#1E5AF2;"></i></div>
        <h3>${title}</h3>
        <p>${desc}</p>
        <div class="proc-meta"><i data-lucide="clock" style="width:12px;height:12px;"></i> Duración: ${dur}</div>
        <div class="proc-meta"><i data-lucide="file" style="width:12px;height:12px;"></i> Documentos: ${docs}</div>

function toggleAddBank(val) {

function saveNewBankAccount() {
    const titular = document.getElementById('nba-titular')?.value || 'Titular Nuevo';
    const banco = document.getElementById('nba-banco')?.value || 'Bancolombia';
    const tipo = document.getElementById('nba-tipo')?.value || 'Ahorros';
    const numero = document.getElementById('nba-num')?.value || '000-000000-00';
    S.bankAccounts.push({ id: Date.now(), titular, banco, tipo, numero, validado: true });

    render();

function removeBankAccount(idx) {
    S.bankAccounts.splice(idx, 1);
    render();
}

function finishWizard() {
    // Crear primera tienda desde el wizard
    S.stores = [{
        nombre: S.wizardStore.nombre || 'Sede Principal',
        direccion: S.wizardStore.direccion || '',
        bank: S.bankAccounts.length > 0 ? null : null,  // se asigna en panel
        logo: false,
        portada: false,
        horarios: false,
        menu: false,

    S.panelTab = 'brand';
    go('panel');
}

function viewPanel() {
    const allStoresDone = S.stores.every(s => s.bank && s.horarios && s.menu);
    const brandDone = S.stores.length > 0 && S.stores[0].logo && S.stores[0].portada; // brand is global but we track on store[0]

    // Determine active tab content
    let content = '';
    if (S.panelTab === 'brand') {
        content = panelBrandTab();
    } else if (S.panelTab === 'new-store') {
        content = panelNewStoreTab();
    } else {
        const idx = parseInt(S.panelTab.replace('store-', ''));
        if (!isNaN(idx) && S.stores[idx]) content = panelStoreTab(idx);
    }

    const tabList = `
    <div style="display:flex;align-items:stretch;border-bottom:1px solid #E5E7EB;margin-bottom:28px;overflow-x:auto;gap:4px;">
        <button class="ptab ${S.panelTab==='brand'?'active':''}" onclick="setPanelTab('brand')">

        </button>
        ${S.stores.map((s, i) => `
        <button class="ptab ${S.panelTab===`store-${i}`?'active':''}" onclick="setPanelTab('store-${i}')">
            🏪 ${s.nombre}
            ${(s.bank && s.horarios && s.menu) ? ' ✅' : ''}
        </button>`).join('')}
        <button class="ptab add-tab ${allStoresDone && brandDone ? '' : 'locked'}" onclick="${allStoresDone && brandDone ? "setPanelTab('new-store')" : ''}">

        </button>

    return `

        <!-- Header -->

            <div>
                <div style="font-size:12px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Spinoff de ${S.aliado?.brand}</div>
                <h2 style="font-size:22px;font-weight:800;color:#111827;margin-bottom:2px;">${S.spinoffName || 'Nueva Marca'}</h2>
                <p style="font-size:13px;color:#6B7280;">${S.aliado?.nombre} · NIT ${S.aliado?.nit}</p>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:12px;font-weight:600;color:#D97706;background:#FEF3C7;padding:6px 14px;border-radius:20px;display:flex;align-items:center;gap:6px;">

            </div>
        </div>

        <!-- Panel container -->
        <div style="background:white;border:1px solid #E5E7EB;border-radius:14px;padding:28px;">
            ${tabList}
            ${content}

        ${!allStoresDone || !brandDone ? `
        <div class="alert-info" style="margin-top:16px;display:flex;align-items:center;gap:8px;">
            <i data-lucide="info" style="width:15px;height:15px;flex-shrink:0;"></i>
            Completa la configuración de <strong>Marca</strong> y de <strong>todas las tiendas</strong> para poder agregar una nueva sucursal.
        </div>` : `
        <div style="margin-top:16px;background:#F0FDF4;border:1px solid #6EE7B7;border-radius:10px;padding:12px 16px;font-size:13px;color:#059669;display:flex;align-items:center;gap:8px;">

            ¡Todo completado! Puedes agregar una nueva sucursal con el botón <strong>+ Nueva tienda</strong>.
        </div>`}
    </div>`;

                <div class="upload-zone ${store0.portada?'done':''}" style="height:140px;" onclick="markPortadaUploaded()">
                    ${store0.portada ? `
                    <i data-lucide="check-circle" style="width:28px;height:28px;color:#10B981;margin-bottom:6px;"></i>
                    <span style="font-size:13px;font-weight:600;color:#10B981;">Portada cargada</span>` : `
                    <i data-lucide="upload" style="width:24px;height:24px;color:#CBD5E1;margin-bottom:6px;"></i>
                    <span style="font-size:13px;color:#9CA3AF;">Haz clic para subir</span>`}
                </div>
            </div>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-top:24px;">
            ${store0.logo && store0.portada ? `
            <button class="btn-primary" onclick="setPanelTab('store-0')">
                Ir a configurar tienda →
            </button>` : `
            <button class="btn-primary" style="background:#E5E7EB;cursor:not-allowed;" disabled>
                Completa logo y portada para continuar
            </button>`}
        </div>
    </div>`;
}

function markLogoUploaded() { if (S.stores[0]) S.stores[0].logo = true; render(); }
function markPortadaUploaded() { if (S.stores[0]) S.stores[0].portada = true; render(); }

// --- Tab: TIENDA (por índice) ---
function panelStoreTab(idx) {
    const store = S.stores[idx];
    const accounts = S.bankAccounts;

    return `
    <div>
        <h3 style="font-size:18px;font-weight:800;color:#111827;margin-bottom:2px;">Panel de Tienda: ${store.nombre}</h3>
        <p style="font-size:13px;color:#6B7280;margin-bottom:24px;">Completa los pasos específicos para <strong>${store.nombre}</strong>.</p>

        <!-- Cuenta bancaria -->
        <div style="background:white;border:1px solid #E5E7EB;border-radius:12px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:12px;">
                <i data-lucide="credit-card" style="width:20px;height:20px;color:${store.bank?'#059669':'#F59E0B'};flex-shrink:0;"></i>
                <div>
                    <div style="font-size:14px;font-weight:700;color:#111827;">Cuenta Bancaria Asignada</div>
                    <div style="font-size:12px;color:#6B7280;">Selecciona la cuenta donde se depositarán las liquidaciones exclusivamente por las ventas de esta tienda.</div>
                </div>
            </div>
            <div style="min-width:220px;">
                ${store.bank ? `
                <div style="display:flex;align-items:center;gap:8px;">
                    <div style="flex:1;background:#F0FDF4;border:1px solid #6EE7B7;border-radius:8px;padding:8px 12px;">
                        <div style="font-size:13px;font-weight:600;color:#065F46;">${store.bank.titular}</div>
                        <div style="font-size:11px;color:#6B7280;">${store.bank.banco} · ${store.bank.tipo}</div>
                    </div>
                    <button onclick="S.stores[${idx}].bank=null;render();" style="background:none;border:none;cursor:pointer;color:#9CA3AF;" title="Cambiar">
                        <i data-lucide="refresh-cw" style="width:15px;height:15px;"></i>
                    </button>
                </div>` : accounts.length > 0 ? `
                <select class="field-input" onchange="assignBank(${idx}, this.value)" style="font-size:13px;">
                    <option value="">Seleccionar cuenta...</option>
                    ${accounts.map((a,i) => `<option value="${i}">${a.titular} · ${a.banco}</option>`).join('')}
                </select>` : `
                <p style="font-size:13px;color:#EF4444;display:flex;align-items:center;gap:6px;">
                    <i data-lucide="alert-circle" style="width:14px;height:14px;"></i>
                    No hay cuentas registradas.
                    <button class="btn-link" onclick="go('bank-accounts')">Agregar →</button>
                </p>`}
            </div>
        </div>

        <!-- Cards de configuración -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            ${configCard2(idx, 'horarios', 'Horarios de atención', 'Configura los días y horas de apertura de esta sucursal.', 'clock')}
            ${configCard2(idx, 'menu', 'Menú y gestión', 'Carga tus productos, configura precios y descripciones del catálogo.', 'book-open')}
        </div>

        ${store.bank && store.horarios && store.menu ? `
        <div style="margin-top:20px;background:#F0FDF4;border:1px solid #6EE7B7;border-radius:10px;padding:14px 18px;font-size:13px;color:#059669;display:flex;align-items:center;gap:8px;">
            <i data-lucide="check-circle" style="width:15px;height:15px;"></i>
            <strong>${store.nombre}</strong> está completamente configurada. ¡Excelente trabajo!
        </div>` : ''}
    </div>`;
}

function configCard2(storeIdx, field, title, desc, icon) {
    const store = S.stores[storeIdx];
    const done = store[field];
    return `
    <div class="config-card ${done?'done':'pending'}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="width:36px;height:36px;border-radius:8px;background:${done?'#D1FAE5':'#FEF3C7'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i data-lucide="${icon}" style="width:17px;height:17px;color:${done?'#059669':'#D97706'};"></i>
            </div>
            <h4 style="font-size:14px;font-weight:700;color:#111827;">${title}</h4>
        </div>
        <p style="font-size:13px;color:#6B7280;margin-bottom:16px;">${desc}</p>
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="${done?'color:#059669':'color:#D97706'};font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;">
                ${done ? `<i data-lucide="check-circle" style="width:14px;height:14px;"></i> Completado` : `⏳ Pendiente`}
            </span>
            ${done
                ? `<button onclick="S.stores[${storeIdx}]['${field}']=false;render();" style="font-size:12px;color:#9CA3AF;background:none;border:none;cursor:pointer;">Editar</button>`
                : `<button class="btn-primary" style="font-size:13px;padding:7px 18px;" onclick="S.stores[${storeIdx}]['${field}']=true;render();">Iniciar</button>`
            }
        </div>
    </div>`;
}

function assignBank(storeIdx, accIdx) {
    if (accIdx === '') return;
    S.stores[storeIdx].bank = S.bankAccounts[parseInt(accIdx)];
    render();
}

// --- Tab: NUEVA TIENDA ---
function panelNewStoreTab() {
    return `
    <div>
        <h3 style="font-size:18px;font-weight:800;color:#111827;margin-bottom:4px;">Nueva sucursal</h3>
        <p style="font-size:13px;color:#6B7280;margin-bottom:24px;">Ingresa los datos de la nueva tienda para <strong>${S.spinoffName}</strong>.</p>

        <div style="display:flex;flex-direction:column;gap:14px;max-width:540px;">
            <div class="field-group">
                <label class="field-label">Nombre de la tienda *</label>
                <input class="field-input" type="text" id="ns-nombre" placeholder="Ej: Sede Norte">
            </div>
            <div class="field-group">
                <label class="field-label">Dirección *</label>
                <input class="field-input" type="text" id="ns-dir" placeholder="Ej: Calle 80 # 45-20, Bogotá">
                <div style="margin-top:8px;background:#F4F6FA;border:1px solid #E5E7EB;border-radius:10px;height:80px;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:13px;gap:6px;">
                    <i data-lucide="map-pin" style="width:14px;height:14px;"></i> Vista de mapa
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div class="field-group">
                    <label class="field-label">Tipo de documento</label>
                    <select class="field-input" id="ns-docTipo"><option>NIT</option><option>RUT</option></select>
                </div>
                <div class="field-group">
                    <label class="field-label">Número de documento</label>
                    <input class="field-input" type="text" id="ns-docNum" placeholder="000.000.000-0">
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Tipo de comida</label>
                <select class="field-input" id="ns-comida">
                    ${['Colombiana','Argentina','Italiana','Mexicana','Americana','Japonesa'].map(c=>`<option>${c}</option>`).join('')}
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:14px;">
                <div class="field-group">
                    <label class="field-label">Prefijo</label>
                    <select class="field-input" id="ns-prefijo"><option>+57</option><option>+54</option><option>+52</option></select>
                </div>
                <div class="field-group">
                    <label class="field-label">Teléfono *</label>
                    <input class="field-input" type="tel" id="ns-tel" placeholder="310 000 0000">
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Correo electrónico *</label>
                <input class="field-input" type="email" id="ns-email" placeholder="correo@ejemplo.com">
            </div>

            <!-- Cuenta bancaria para esta tienda -->
            <div style="border-top:1px solid #F3F4F6;padding-top:16px;margin-top:4px;">
                <label class="field-label">Cuenta bancaria para esta sucursal</label>
                ${S.bankAccounts.length > 0 ? `
                <select class="field-input" id="ns-bank">
                    <option value="">— Asignar después desde el panel —</option>
                    ${S.bankAccounts.map((a,i)=>`<option value="${i}">${a.titular} · ${a.banco} · ${a.tipo}</option>`).join('')}
                </select>` : `
                <div class="alert-warn" style="font-size:13px;">No hay cuentas registradas. Podrás asignarla desde el panel de la tienda.</div>`}
            </div>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-top:24px;border-top:1px solid #F3F4F6;padding-top:20px;gap:10px;">
            <button class="btn-secondary" onclick="setPanelTab('store-${S.stores.length-1}')">Cancelar</button>
            <button class="btn-primary" onclick="saveNewStore()">Guardar tienda</button>
        </div>
    </div>`;
}

function saveNewStore() {
    const nombre = document.getElementById('ns-nombre')?.value || 'Nueva Sucursal';
    const direccion = document.getElementById('ns-dir')?.value || '';
    const bankSel = document.getElementById('ns-bank')?.value;
    const bank = (bankSel && bankSel !== '') ? S.bankAccounts[parseInt(bankSel)] : null;
    S.stores.push({ nombre, direccion, bank, logo: false, portada: false, horarios: false, menu: false });
    S.panelTab = `store-${S.stores.length - 1}`;
    render();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
render();
    </script>
</body>
</html>
